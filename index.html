<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <title>Visualiseur microGPT</title>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

      addEventListener("DOMContentLoaded", () => {

        const a = s.getPropertyValue("--green").trim() || "oklch(0.698 0.094 130.4)";
        console.log(
          "%c\n  ██████╗         █████╗    ██████╗\n  ██╔══██╗       ██╔══██╗   ██╔════╝\n  ██████╔╝       ███████║   ██║  ███╗\n  ██╔═══╝ █████╗ ██╔══██║   ██║   ██║\n  ██║     ╚════╝ ██║  ██║ ▄ ╚██████╔╝\n  ╚═╝            ╚═╝  ╚═╝ ▀  ╚═════╝\n",
          "color:" + a + ";font-family:monospace;",
        );
        console.log(
          "%c microGPT visualizer-fr — par P-A.G ",
          "background:" + a + ";color:oklch(0.15 0 0);padding:6px 12px;border-radius:4px;font-weight:bold;font-family:monospace;",
        );
        console.log(
          "%c Curieux ? Le code est open-source \u2192 github.com/mon-atelier-ia ",
          "color:oklch(0.65 0.15 250);font-size:11px;",
        );
      });
    </script>
  </body>
